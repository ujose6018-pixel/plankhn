<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plank HN - Admin Control</title>
    <!-- React & Tailwind -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Firebase SDK v9+ -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <!-- Crypto-JS -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .admin-sidebar { background: #0f172a; color: white; }
        .card { @apply bg-white p-6 rounded-[2.5rem] shadow-sm border border-slate-200 transition-all hover:shadow-md; }
    </style>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <!-- Cargar Configuración -->
    <script src="./firebaseConfig.js"></script>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- ENCRIPTACIÓN ---
        const SECRET_KEY = window.ENCRYPTION_KEY;
        const decryptData = (ciphertext) => {
            if (!ciphertext) return 'N/A';
            try {
                const bytes = CryptoJS.AES.decrypt(ciphertext, SECRET_KEY);
                return bytes.toString(CryptoJS.enc.Utf8);
            } catch (e) { return 'Error de Cifrado'; }
        };

        // --- INICIALIZAR FIREBASE ---
        firebase.initializeApp(window.FIREBASE_CONFIG);
        const auth = firebase.auth();
        const db = firebase.firestore();

        function AdminApp() {
            const [view, setView] = useState('vouchers');
            const [vouchers, setVouchers] = useState([]);
            const [services, setServices] = useState([]);
            const [groups, setGroups] = useState([]);
            const [usersData, setUsersData] = useState({});
            const [loading, setLoading] = useState(true);

            useEffect(() => {
                // Fetch Users to cache decryption
                const fetchUsers = async () => {
                    const snap = await db.collection('users').get();
                    const data = {};
                    snap.docs.forEach(doc => {
                        const d = doc.data();
                        data[doc.id] = {
                            username: decryptData(d.username),
                            phone: decryptData(d.phone)
                        };
                    });
                    setUsersData(data);
                };

                const unsubscribeVouchers = db.collection('vouchers').orderBy('createdAt', 'desc').onSnapshot(snapshot => {
                    setVouchers(snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() })));
                    setLoading(false);
                });

                const unsubscribeServices = db.collection('services').onSnapshot(snapshot => {
                    setServices(snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() })));
                });

                const unsubscribeGroups = db.collection('service_groups').onSnapshot(snapshot => {
                    setGroups(snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() })));
                });

                fetchUsers();

                return () => {
                    unsubscribeVouchers();
                    unsubscribeServices();
                    unsubscribeGroups();
                };
            }, []);

            const approveVoucher = async (voucher) => {
                try {
                    await db.collection('vouchers').doc(voucher.id).update({ status: 'aprobado' });
                    alert('Pago aprobado correctamente.');
                } catch (error) { alert('Error al aprobar.'); }
            };

            const addService = async (e) => {
                e.preventDefault();
                const name = e.target.name.value;
                const price = Number(e.target.price.value);
                await db.collection('services').add({ name, price, color: 'bg-indigo-600' });
                e.target.reset();
            };

            const addGroup = async (e) => {
                e.preventDefault();
                const serviceId = e.target.serviceId.value;
                const service = services.find(s => s.id === serviceId);
                const groupName = e.target.groupName.value;
                await db.collection('service_groups').add({ serviceId, serviceName: service.name, groupName, status: 'activo' });
                e.target.reset();
            };

            return (
                <div className="flex min-h-screen">
                    <aside className="w-72 admin-sidebar p-8 flex flex-col gap-8 sticky top-0 h-screen">
                        <div className="text-3xl font-black tracking-tighter">PLANK <span className="text-indigo-500">HN</span></div>
                        <nav className="flex flex-col gap-3">
                            <button onClick={() => setView('vouchers')} className={`text-left p-4 rounded-2xl font-black transition-all ${view === 'vouchers' ? 'bg-indigo-600' : 'hover:bg-white/5 text-slate-500'}`}>VALIDAR PAGOS</button>
                            <button onClick={() => setView('services')} className={`text-left p-4 rounded-2xl font-black transition-all ${view === 'services' ? 'bg-indigo-600' : 'hover:bg-white/5 text-slate-500'}`}>SERVICIOS</button>
                            <button onClick={() => setView('groups')} className={`text-left p-4 rounded-2xl font-black transition-all ${view === 'groups' ? 'bg-indigo-600' : 'hover:bg-white/5 text-slate-500'}`}>GRUPOS</button>
                        </nav>
                        <button 
                            onClick={() => {
                                auth.signOut();
                                window.location.href = '/';
                            }} 
                            className="mt-auto text-slate-500 hover:text-white font-bold text-sm uppercase tracking-widest text-left"
                        >
                            Cerrar Sesión
                        </button>
                    </aside>

                    <main className="flex-1 p-12">
                        {view === 'vouchers' && (
                            <section>
                                <h2 className="text-4xl font-black mb-10 text-slate-900">Pagos por Validar</h2>
                                <div className="grid gap-6">
                                    {vouchers.map(v => (
                                        <div key={v.id} className="card flex items-center justify-between">
                                            <div className="flex items-center gap-8">
                                                <div className="relative">
                                                    <img src={v.imageUrl} className="w-28 h-28 object-cover rounded-[2rem] shadow-xl cursor-zoom-in" onClick={() => window.open(v.imageUrl)} />
                                                    <div className="absolute -bottom-2 -right-2 bg-indigo-600 text-white p-2 rounded-xl shadow-lg">
                                                        <span className="text-[10px] font-black uppercase tracking-tighter">IA OK</span>
                                                    </div>
                                                </div>
                                                <div>
                                                    <p className="font-black text-xl text-slate-900 mb-1">{usersData[v.userId]?.username || 'Cargando...'}</p>
                                                    <p className="text-sm font-bold text-indigo-600 bg-indigo-50 px-3 py-1 rounded-lg inline-block mb-3">{usersData[v.userId]?.phone || '...'}</p>
                                                    <div className="flex gap-4 items-center">
                                                        <p className="text-sm font-bold text-slate-400 uppercase tracking-widest">{v.serviceName}</p>
                                                        <p className="text-lg font-black text-slate-900">L{v.amount}</p>
                                                    </div>
                                                </div>
                                            </div>
                                            <div className="flex flex-col items-end gap-3">
                                                <span className={`px-4 py-1.5 rounded-full text-[10px] font-black uppercase tracking-widest ${v.status === 'aprobado' ? 'bg-emerald-100 text-emerald-600' : 'bg-amber-100 text-amber-600'}`}>
                                                    {v.status}
                                                </span>
                                                {v.status === 'pendiente' && (
                                                    <button onClick={() => approveVoucher(v)} className="bg-slate-900 text-white px-8 py-4 rounded-2xl font-black hover:bg-indigo-600 transition-all shadow-xl">
                                                        ACREDITAR CUENTA
                                                    </button>
                                                )}
                                            </div>
                                        </div>
                                    ))}
                                    {vouchers.length === 0 && <p className="text-slate-400 font-bold text-center py-20 uppercase tracking-widest">Sin pagos pendientes</p>}
                                </div>
                            </section>
                        )}

                        {view === 'services' && (
                            <section>
                                <div className="flex justify-between items-center mb-10">
                                    <h2 className="text-4xl font-black text-slate-900">Catálogo</h2>
                                    <form onSubmit={addService} className="flex gap-4 bg-white p-4 rounded-[2rem] shadow-sm border border-slate-100">
                                        <input name="name" placeholder="Servicio" required className="px-6 py-3 rounded-xl bg-slate-50 border-0 focus:ring-2 focus:ring-indigo-600" />
                                        <input name="price" type="number" placeholder="Precio" required className="w-24 px-6 py-3 rounded-xl bg-slate-50 border-0 focus:ring-2 focus:ring-indigo-600" />
                                        <button className="bg-indigo-600 text-white px-8 py-3 rounded-xl font-black hover:shadow-lg transition-all">Añadir</button>
                                    </form>
                                </div>
                                <div className="grid grid-cols-1 md:grid-cols-3 gap-8">
                                    {services.map(s => (
                                        <div key={s.id} className="card">
                                            <div className="bg-indigo-50 w-12 h-12 rounded-xl flex items-center justify-center text-indigo-600 mb-4 font-black">🎬</div>
                                            <h3 className="font-black text-2xl text-slate-900 mb-1">{s.name}</h3>
                                            <p className="text-3xl font-black text-indigo-600">L{s.price}</p>
                                        </div>
                                    ))}
                                </div>
                            </section>
                        )}

                        {view === 'groups' && (
                            <section>
                                <div className="flex justify-between items-center mb-10">
                                    <h2 className="text-4xl font-black text-slate-900">Gestión de Grupos</h2>
                                    <form onSubmit={addGroup} className="flex gap-4 bg-white p-4 rounded-[2rem] shadow-sm border border-slate-100">
                                        <select name="serviceId" className="px-6 py-3 rounded-xl bg-slate-50 border-0 focus:ring-2 focus:ring-indigo-600" required>
                                            <option value="">Servicio</option>
                                            {services.map(s => <option key={s.id} value={s.id}>{s.name}</option>)}
                                        </select>
                                        <input name="groupName" placeholder="Nombre Grupo" required className="px-6 py-3 rounded-xl bg-slate-50 border-0 focus:ring-2 focus:ring-indigo-600" />
                                        <button className="bg-indigo-600 text-white px-8 py-3 rounded-xl font-black hover:shadow-lg transition-all">Crear</button>
                                    </form>
                                </div>
                                <div className="grid gap-6">
                                    {groups.map(g => (
                                        <div key={g.id} className="card flex justify-between items-center">
                                            <div>
                                                <p className="font-black text-2xl text-slate-900">{g.groupName}</p>
                                                <p className="text-sm font-bold text-slate-400 uppercase tracking-widest">{g.serviceName}</p>
                                            </div>
                                            <span className="bg-emerald-50 text-emerald-600 px-6 py-2 rounded-xl font-black text-xs uppercase tracking-widest">{g.status}</span>
                                        </div>
                                    ))}
                                </div>
                            </section>
                        )}
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<AdminApp />);
    </script>
</body>
</html>
