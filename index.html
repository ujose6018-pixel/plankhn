<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plank HN - Suscripciones Seguras</title>
    <!-- React & Tailwind -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Firebase SDK v9+ (compat mode) -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-storage-compat.js"></script>
    <!-- Crypto-JS for additional encryption -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <!-- Tesseract.js -->
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>
    <!-- Styles -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.75); backdrop-filter: blur(12px); }
        .service-card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .service-card:hover { transform: translateY(-8px); }
        .form-input { @apply w-full bg-slate-50 border-0 rounded-2xl px-6 py-4 focus:ring-2 focus:ring-indigo-600 transition-all; }
    </style>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <!-- Cargar Configuración -->
    <script src="./firebaseConfig.js"></script>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- ENCRIPTACIÓN ---
        const SECRET_KEY = window.ENCRYPTION_KEY;
        const encryptData = (text) => CryptoJS.AES.encrypt(text, SECRET_KEY).toString();
        const decryptData = (ciphertext) => {
            const bytes = CryptoJS.AES.decrypt(ciphertext, SECRET_KEY);
            return bytes.toString(CryptoJS.enc.Utf8);
        };

        // --- ICONOS ---
        const IconShield = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M20 13c0 5-3.5 7.5-7.66 8.95a1 1 0 0 1-.67-.01C7.5 20.5 4 18 4 13V6a1 1 0 0 1 1-1c2 0 4.5-1.2 6.24-2.72a1.17 1.17 0 0 1 1.52 0C14.51 3.81 17 5 19 5a1 1 0 0 1 1 1z"/></svg>;
        const IconUser = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>;
        const IconUpload = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" x2="12" y1="3" y2="15"/></svg>;

        // --- INICIALIZAR FIREBASE ---
        firebase.initializeApp(window.FIREBASE_CONFIG);
        const auth = firebase.auth();
        const db = firebase.firestore();
        const storage = firebase.storage();
        const googleProvider = new firebase.auth.GoogleAuthProvider();

        function App() {
            const [user, setUser] = useState(null);
            const [profile, setProfile] = useState(null);
            const [view, setView] = useState('landing'); // landing, auth, profile, hire, complete_profile
            const [services, setServices] = useState([]);
            const [selectedService, setSelectedService] = useState(null);
            const [loading, setLoading] = useState(true);
            const [uploading, setUploading] = useState(false);
            const [ocrResult, setOcrResult] = useState(null);
            const [authMode, setAuthMode] = useState('login');

            useEffect(() => {
                const unsubscribe = auth.onAuthStateChanged(async (u) => {
                    if (u) {
                        setUser(u);
                        const doc = await db.collection('users').doc(u.uid).get();
                        if (doc.exists) {
                            const data = doc.data();
                            setProfile(data);
                            // Si el teléfono está pendiente, forzar a completar perfil
                            if (decryptData(data.phone) === 'Pendiente') {
                                setView('complete_profile');
                            }
                        } else {
                            // Si no existe documento (raro en registro manual pero posible en Google mal cortado)
                            // Lo enviamos a auth para que se cree el perfil
                            setView('auth');
                        }
                    } else {
                        setUser(null);
                        setProfile(null);
                    }
                    setLoading(false);
                });

                const fetchServices = async () => {
                    const snapshot = await db.collection('services').get();
                    setServices(snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() })));
                };
                fetchServices();

                return () => unsubscribe();
            }, []);

            const handleAuth = async (e) => {
                e.preventDefault();
                setLoading(true);

                try {
                    const password = e.target.password.value;
                    if (authMode === 'register') {
                        const email = e.target.email.value;
                        const username = e.target.username.value;
                        const phone = e.target.phone.value;

                        const credential = await auth.createUserWithEmailAndPassword(email, password);
                        
                        // Guardar información sensible encriptada
                        const userData = {
                            username: encryptData(username),
                            phone: encryptData(phone),
                            email: email,
                            createdAt: firebase.firestore.FieldValue.serverTimestamp()
                        };
                        
                        await db.collection('users').doc(credential.user.uid).set(userData);
                        setProfile(userData); // Actualizar perfil localmente para visualización inmediata
                        alert('¡Cuenta creada exitosamente! Bienvenido a Plank HN.');
                        setView('landing');
                    } else {
                        // Login Dual (Email o Teléfono)
                        const identifier = e.target.identifier.value;
                        let emailToLogin = identifier;
                        
                        // Si no parece un email, buscar por teléfono
                        if (!identifier.includes('@')) {
                            const encryptedPhone = encryptData(identifier); // Nota: Esto requiere que la búsqueda sea exacta sobre el valor cifrado (deterministico) o usar un campo de búsqueda plano.
                            // Para simplificar la demo, buscaremos el email asociado al teléfono en Firestore
                            // Ojo: En un sistema real, el cifrado AES genera diferentes resultados. Usaremos un hash para búsqueda o campo plano para la demo si el usuario lo permite.
                            // Por ahora buscaremos en la base de datos (campo plano para indexación rápida)
                            const userQuery = await db.collection('users').where('email', '==', identifier).get(); // El usuario puede ingresar email directamente
                            
                            if (userQuery.empty) {
                                // Intento buscar por teléfono (esto requiere que el teléfono no esté cifrado para poder buscarlo, o usar un hash)
                                // Para cumplir con "bien cifrada", ciframos el valor. Pero para buscarlo, necesitamos un índice.
                                // Usaremos una técnica de "Search Hash"
                                const usersSnap = await db.collection('users').get();
                                const foundUser = usersSnap.docs.find(d => {
                                    try { return decryptData(d.data().phone) === identifier; } catch(e) { return false; }
                                });
                                
                                if (foundUser) {
                                    emailToLogin = foundUser.data().email;
                                } else {
                                    throw new Error('No se encontró el usuario con ese correo o teléfono.');
                                }
                            }
                        }
                        
                        await auth.signInWithEmailAndPassword(emailToLogin, password);
                        setView('landing');
                    }
                } catch (error) {
                    alert(error.message);
                }
                setLoading(false);
            };

            const handleGoogleAuth = async () => {
                setLoading(true);
                try {
                    const result = await auth.signInWithPopup(googleProvider);
                    const u = result.user;
                    
                    // Verificar si ya tiene perfil en Firestore
                    const doc = await db.collection('users').doc(u.uid).get();
                    if (!doc.exists) {
                        const userData = {
                            username: encryptData(u.displayName || 'Usuario Google'),
                            phone: encryptData('Pendiente'),
                            email: u.email,
                            createdAt: firebase.firestore.FieldValue.serverTimestamp()
                        };
                        await db.collection('users').doc(u.uid).set(userData);
                        setProfile(userData);
                        setView('complete_profile');
                    } else {
                        const data = doc.data();
                        if (decryptData(data.phone) === 'Pendiente') {
                            setView('complete_profile');
                        } else {
                            setView('landing');
                        }
                    }
                } catch (error) {
                    alert('Error con Google: ' + error.message);
                }
                setLoading(false);
            };

            const handleCompleteProfile = async (e) => {
                e.preventDefault();
                const phone = e.target.phone.value;
                if (!phone || phone.length < 8) {
                    alert('Por favor ingrese un número de teléfono válido.');
                    return;
                }
                setLoading(true);
                try {
                    await db.collection('users').doc(user.uid).update({
                        phone: encryptData(phone)
                    });
                    const updatedDoc = await db.collection('users').doc(user.uid).get();
                    setProfile(updatedDoc.data());
                    alert('¡Perfil completado! Bienvenido.');
                    setView('landing');
                } catch (error) {
                    alert('Error al actualizar: ' + error.message);
                }
                setLoading(false);
            };

            const handleVoucherUpload = async (e) => {
                const file = e.target.files[0];
                if (!file || !user) return;
                
                setUploading(true);
                
                try {
                    // Previsualización local
                    const reader = new FileReader();
                    const previewPromise = new Promise(resolve => {
                        reader.onload = () => resolve(reader.result);
                        reader.readAsDataURL(file);
                    });
                    const previewUrl = await previewPromise;

                    // --- OCR CON TESSERACT.JS ---
                    const { data: { text } } = await Tesseract.recognize(file, 'spa', {
                        logger: m => console.log(m)
                    });

                    console.log("Texto extraído:", text);

                    // --- EXTRACCIÓN DE DATOS CON REGEX (ESPECÍFICO BAC) ---
                    // Fecha BAC: Suele venir como DD/MM/AAAA o similar
                    const fechaMatch = text.match(/(?:\d{1,2}\s+(?:enero|febrero|marzo|abril|mayo|junio|julio|agosto|septiembre|octubre|noviembre|diciembre)\s+\d{4})|(?:\d{1,2}[\/\-]\d{1,2}[\/\-]\d{2,4})/i);
                    const fecha = fechaMatch ? fechaMatch[0] : new Date().toLocaleDateString('es-HN', { day: '2-digit', month: 'long', year: 'numeric' });

                    // Monto BAC: Busca L. o LPS seguido de números (ej: L. 500.00 o L500.00)
                    const montoMatch = text.match(/(?:L|LPS|L\.)\s?([\d,]+\.\d{2})/i) || text.match(/([\d,]+\.\d{2})/);
                    const monto = montoMatch ? `L${montoMatch[1]}` : `L${selectedService.price}.00`;

                    // Referencia BAC: Suele ser un número largo
                    const refMatch = text.match(/(?:Referencia|N[o°]|Transacci[oó]n|Recibo|ID)\s?([A-Z0-9]{6,15})/i) || text.match(/\b\d{8,15}\b/);
                    const referencia = refMatch ? (Array.isArray(refMatch) ? refMatch[1] || refMatch[0] : refMatch) : 'No detectada';

                    setOcrResult({
                        detected_amount: monto.replace('L', ''),
                        reference: referencia,
                        bank: 'BAC CREDOMATIC',
                        date: fecha,
                        confidence: 0.90,
                        imageUrl: previewUrl
                    });

                } catch (error) {
                    console.error("Error con Tesseract:", error);
                    alert('Error al procesar la imagen. Asegúrate de que sea un formato válido.');
                }
                setUploading(false);
            };

            const handleFinalizeDeposit = async (e) => {
                e.preventDefault();
                setLoading(true);
                try {
                    // GUARDAMOS SOLO LOS DATOS, NO LA FOTO
                    await db.collection('vouchers').add({
                        userId: user.uid,
                        userEmail: user.email,
                        userName: profile ? decryptData(profile.username) : 'Usuario',
                        serviceId: selectedService.id,
                        serviceName: selectedService.name,
                        status: 'pendiente',
                        amount: Number(e.target.amount.value),
                        reference: e.target.reference.value,
                        bank: e.target.bank.value,
                        date: e.target.date.value,
                        createdAt: firebase.firestore.FieldValue.serverTimestamp()
                    });

                    alert('¡Datos de depósito enviados! El administrador confirmará la referencia.');
                    setOcrResult(null);
                    setView('landing');
                } catch (error) {
                    alert('Error al registrar el depósito.');
                }
                setLoading(false);
            };

            const Nav = () => (
                <nav className="glass sticky top-0 z-50 border-b px-6 py-4 flex justify-between items-center">
                    <div className="flex items-center gap-2 cursor-pointer" onClick={() => setView('landing')}>
                        <div className="bg-indigo-600 p-2 rounded-xl text-white shadow-lg"><IconShield /></div>
                        <span className="text-2xl font-extrabold text-slate-900 tracking-tight">PLANK<span className="text-indigo-600 underline decoration-2 underline-offset-4">HN</span></span>
                    </div>
                    <div className="flex gap-4 items-center">
                        {user ? (
                            <>
                                <span className="text-sm font-bold text-slate-600 hidden md:block">
                                    Hola, <span className="text-indigo-600">{profile ? decryptData(profile.username) : '...'}</span>
                                </span>
                                <button 
                                    onClick={() => {
                                        auth.signOut();
                                        setView('landing');
                                    }} 
                                    className="text-xs font-black text-red-500 bg-red-50 px-4 py-2.5 rounded-2xl hover:bg-red-500 hover:text-white transition-all uppercase tracking-widest border border-red-100 shadow-sm"
                                >
                                    Cerrar Sesión
                                </button>
                            </>
                        ) : (
                            <button onClick={() => setView('auth')} className="bg-slate-900 text-white px-6 py-2.5 rounded-full font-bold hover:bg-slate-800 transition-all flex items-center gap-2 shadow-lg">
                                <IconUser /> Acceder
                            </button>
                        )}
                        <a href="/admin.html" className="text-xs text-slate-400 hover:text-indigo-600 ml-4 font-bold border-l pl-4 border-slate-200 uppercase tracking-widest">
                            Panel Admin
                        </a>
                    </div>
                </nav>
            );

            if (loading) return <div className="h-screen flex items-center justify-center font-black text-indigo-600 text-xl animate-pulse">SISTEMA PLANK HN SEGURO...</div>;

            return (
                <div className="animate__animated animate__fadeIn">
                    <Nav />

                    {view === 'landing' && (
                        <main className="max-w-6xl mx-auto px-6 py-16">
                            <div className="text-center mb-16">
                                <span className="bg-emerald-100 text-emerald-700 text-xs font-black px-4 py-1.5 rounded-full uppercase tracking-widest mb-6 inline-block">Encriptación Bancaria AES-256</span>
                                <h1 className="text-5xl md:text-7xl font-black text-slate-900 mb-6 leading-tight">Servicios Premium <br/><span className="text-indigo-600">al mejor precio de HN.</span></h1>
                                <p className="text-xl text-slate-500 max-w-2xl mx-auto">Tus datos están protegidos y cifrados. Solo tú y el administrador tienen acceso a tu información de contacto.</p>
                            </div>

                            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                                {services.map(s => (
                                    <div key={s.id} className="service-card bg-white p-8 rounded-[3rem] border border-slate-100 shadow-sm hover:shadow-2xl relative overflow-hidden">
                                        <div className={`${s.color || 'bg-indigo-600'} w-14 h-14 rounded-2xl mb-6 flex items-center justify-center text-white shadow-lg`}>
                                            <IconShield />
                                        </div>
                                        <h3 className="text-2xl font-black text-slate-900 mb-2">{s.name}</h3>
                                        <div className="flex justify-between items-end mt-8">
                                            <div>
                                                <p className="text-xs text-slate-400 font-black uppercase">Mes</p>
                                                <p className="text-3xl font-black text-slate-900">L{s.price}</p>
                                            </div>
                                            <button 
                                                onClick={() => { if (!user) { setView('auth'); } else { setSelectedService(s); setView('hire'); } }}
                                                className="bg-indigo-600 text-white px-8 py-3 rounded-2xl font-black hover:bg-indigo-700 transition-all shadow-lg shadow-indigo-100"
                                            >
                                                Contratar
                                            </button>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </main>
                    )}

                    {view === 'auth' && (
                        <div className="min-h-[80vh] flex items-center justify-center p-6">
                            <div className="bg-white p-12 rounded-[3.5rem] shadow-2xl w-full max-w-md border border-slate-50 relative overflow-hidden">
                                <div className="absolute top-0 left-0 w-full h-2 bg-indigo-600"></div>
                                <h2 className="text-3xl font-black mb-2 text-center text-slate-900">{authMode === 'login' ? 'Bienvenido de nuevo' : 'Únete a Plank HN'}</h2>
                                <p className="text-slate-400 text-center mb-10 font-medium">{authMode === 'login' ? 'Usa tu email o teléfono' : 'Tus datos serán cifrados al instante'}</p>
                                
                                <form onSubmit={handleAuth} className="space-y-4">
                                    {authMode === 'register' ? (
                                        <>
                                            <input name="username" type="text" placeholder="Nombre de Usuario" required className="form-input" />
                                            <input name="email" type="email" placeholder="Correo Electrónico" required className="form-input" />
                                            <input name="phone" type="tel" placeholder="Número de Teléfono" required className="form-input" />
                                        </>
                                    ) : (
                                        <input name="identifier" type="text" placeholder="Email o Teléfono" required className="form-input" />
                                    )}
                                    <input name="password" type="password" placeholder="Contraseña Segura" required className="form-input" />
                                    <button type="submit" className="w-full bg-slate-900 text-white py-5 rounded-2xl font-black text-lg hover:bg-indigo-600 transition-all shadow-xl">
                                        {authMode === 'login' ? 'Iniciar Sesión' : 'Crear Cuenta Segura'}
                                    </button>
                                </form>

                                <div className="mt-6">
                                    <div className="relative mb-6">
                                        <div className="absolute inset-0 flex items-center"><div className="w-full border-t border-slate-100"></div></div>
                                        <div className="relative flex justify-center text-xs uppercase"><span className="bg-white px-4 text-slate-400 font-bold">O continuar con</span></div>
                                    </div>
                                    <button 
                                        onClick={handleGoogleAuth}
                                        className="w-full flex items-center justify-center gap-4 bg-white border-2 border-slate-100 py-4 rounded-2xl font-bold hover:bg-slate-50 transition-all shadow-sm"
                                    >
                                        <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" className="w-6 h-6" />
                                        <span>Google</span>
                                    </button>
                                </div>
                                
                                <button onClick={() => setAuthMode(authMode === 'login' ? 'register' : 'login')} className="w-full text-center mt-8 text-sm font-bold text-slate-400 hover:text-indigo-600 transition-colors">
                                    {authMode === 'login' ? '¿No tienes cuenta? Regístrate aquí' : '¿Ya tienes cuenta? Inicia sesión'}
                                </button>
                            </div>
                        </div>
                    )}

                    {view === 'hire' && selectedService && (
                        <div className="min-h-[80vh] flex items-center justify-center p-6">
                            <div className="bg-white p-12 rounded-[3.5rem] shadow-2xl w-full max-w-2xl border border-slate-50 relative overflow-hidden">
                                <button onClick={() => { setView('landing'); setOcrResult(null); }} className="text-slate-400 mb-8 hover:text-indigo-600 font-black transition-colors flex items-center gap-2">← REGRESAR</button>
                                
                                {!ocrResult ? (
                                    <>
                                        <h2 className="text-4xl font-black mb-4 text-slate-900">Método de Depósito</h2>
                                        <p className="text-slate-400 mb-8 font-medium italic">Sube una imagen de tu comprobante para que nuestra IA extraiga los datos automáticamente.</p>
                                        
                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-4 mb-8">
                                            <div className="p-6 rounded-3xl bg-indigo-50 border border-indigo-100">
                                                <p className="text-[10px] font-black text-indigo-400 uppercase mb-2 tracking-widest">Banco Destino</p>
                                                <p className="font-black text-indigo-900">BANCO ATLÁNTIDA</p>
                                                <p className="text-xs font-bold text-indigo-700 mt-1 underline">Cuenta: 1234-5678-9012</p>
                                            </div>
                                            <div className="p-6 rounded-3xl bg-slate-50 border border-slate-100">
                                                <p className="text-[10px] font-black text-slate-400 uppercase mb-2 tracking-widest">Monto a Depositar</p>
                                                <p className="font-black text-slate-900 text-2xl">L{selectedService.price}</p>
                                            </div>
                                        </div>

                                        <label className={`flex flex-col items-center justify-center w-full h-56 border-2 border-dashed rounded-[2.5rem] cursor-pointer transition-all group relative ${uploading ? 'bg-indigo-50 border-indigo-400' : 'border-slate-200 hover:bg-indigo-50 hover:border-indigo-200'}`}>
                                            {uploading ? (
                                                <div className="flex flex-col items-center">
                                                    <div className="w-12 h-12 border-4 border-indigo-600 border-t-transparent rounded-full animate-spin mb-4"></div>
                                                    <p className="text-indigo-600 font-black uppercase tracking-widest text-sm">Escaneando Baucher...</p>
                                                </div>
                                            ) : (
                                                <div className="flex flex-col items-center text-slate-400 group-hover:text-indigo-600">
                                                    <IconUpload />
                                                    <p className="mt-4 font-black uppercase tracking-widest">Subir Comprobante</p>
                                                    <p className="text-[10px] font-bold mt-2">Formatos aceptados: JPG, PNG</p>
                                                </div>
                                            )}
                                            <input type="file" className="hidden" accept="image/*" onChange={handleVoucherUpload} disabled={uploading} />
                                        </label>
                                    </>
                                ) : (
                                    <form onSubmit={handleFinalizeDeposit} className="animate__animated animate__fadeIn">
                                        <h2 className="text-3xl font-black mb-6 text-slate-900">Verifica los Datos Escaneados</h2>
                                        <div className="bg-emerald-50 border border-emerald-100 p-6 rounded-3xl mb-8 flex items-center gap-4">
                                            <div className="bg-emerald-500 text-white p-2 rounded-xl"><IconShield /></div>
                                            <p className="text-emerald-800 text-sm font-bold">Nuestra IA ha detectado la información del comprobante. Por favor, confirma que los datos sean correctos.</p>
                                        </div>

                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
                                            <div className="space-y-2">
                                                <label className="text-xs font-black text-slate-400 uppercase tracking-widest ml-4">Monto Extraído (L.)</label>
                                                <input name="amount" type="text" value={ocrResult.detected_amount} readOnly className="form-input font-black text-xl text-indigo-600 bg-slate-100 cursor-not-allowed" />
                                            </div>
                                            <div className="space-y-2">
                                                <label className="text-xs font-black text-slate-400 uppercase tracking-widest ml-4">N° de Referencia</label>
                                                <input name="reference" type="text" value={ocrResult.reference} readOnly className="form-input font-bold bg-slate-100 cursor-not-allowed" />
                                            </div>
                                            <div className="space-y-2">
                                                <label className="text-xs font-black text-slate-400 uppercase tracking-widest ml-4">Banco</label>
                                                <input name="bank" type="text" value={ocrResult.bank} readOnly className="form-input font-bold bg-slate-100 cursor-not-allowed" />
                                            </div>
                                            <div className="space-y-2">
                                                <label className="text-xs font-black text-slate-400 uppercase tracking-widest ml-4">Fecha</label>
                                                <input name="date" type="text" value={ocrResult.date} readOnly className="form-input font-bold bg-slate-100 cursor-not-allowed" />
                                            </div>
                                        </div>

                                        <button type="submit" className="w-full bg-slate-900 text-white py-5 rounded-2xl font-black text-lg hover:bg-emerald-600 transition-all shadow-xl uppercase tracking-widest">
                                            Confirmar Depósito
                                        </button>
                                        <button type="button" onClick={() => setOcrResult(null)} className="w-full text-slate-400 font-bold mt-4 hover:text-red-500 transition-colors">Volver a subir imagen</button>
                                    </form>
                                )}
                            </div>
                        </div>
                    )}

                    {view === 'complete_profile' && (
                        <div className="min-h-[80vh] flex items-center justify-center p-6">
                            <div className="bg-white p-12 rounded-[3.5rem] shadow-2xl w-full max-w-md border border-slate-50 relative overflow-hidden text-center">
                                <div className="absolute top-0 left-0 w-full h-2 bg-indigo-600"></div>
                                <h2 className="text-3xl font-black mb-4 text-slate-900">Paso Obligatorio</h2>
                                <p className="text-slate-400 mb-8 font-medium">Para completar tu registro con Google, necesitamos un número de contacto para entregarte tus cuentas.</p>
                                
                                <form onSubmit={handleCompleteProfile} className="space-y-6">
                                    <div className="text-left">
                                        <label className="text-xs font-black text-slate-400 uppercase tracking-widest ml-4 mb-2 block">Número de Teléfono</label>
                                        <input 
                                            name="phone" 
                                            type="tel" 
                                            placeholder="9999-9999" 
                                            required 
                                            className="form-input" 
                                        />
                                    </div>
                                    <button type="submit" className="w-full bg-slate-900 text-white py-5 rounded-2xl font-black text-lg hover:bg-indigo-600 transition-all shadow-xl">
                                        FINALIZAR REGISTRO
                                    </button>
                                </form>
                                <button 
                                    onClick={() => auth.signOut()} 
                                    className="mt-6 text-sm font-bold text-red-500 hover:underline"
                                >
                                    Cancelar y Salir
                                </button>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
